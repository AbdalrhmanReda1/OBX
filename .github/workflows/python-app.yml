name: OBX CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install OBX
        run: |
          pip install -e .
          pip install pytest flake8

      - name: Lint check
        run: |
          flake8 obx --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 obx --count --max-complexity=12 --max-line-length=120 --statistics

      - name: Run tests
        run: pytest -v

      - name: Test CLI
        run: obx doctor
